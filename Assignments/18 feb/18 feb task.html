<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="18 feb task script.css">

</head>
<body>
    <div class="form-container">
    <h2>Register</h2>
    <form id="registrationForm">
        <div class="input-group">
            <input type="text" id="name" placeholder="Full Name">
            <small id="nameError" class="error-text"></small>
        </div>

        <div class="input-group">
            <input type="text" id="email" placeholder="Email Address">
            <small id="emailError" class="error-text"></small>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password (min 6 chars)">
            <small id="passwordError" class="error-text"></small>
        </div>

        <div class="input-group">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <small id="confirmError" class="error-text"></small>
        </div>

        <button type="submit">Sign Up</button>
    </form>
</div>
<script src="18 feb task form.js"></script>
    
</body>
</html>
